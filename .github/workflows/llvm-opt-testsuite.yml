name: llvm-opt testsuite

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  testsuite:
    name: Run real-world llvm-opt testsuite
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - name: Setup LLVM
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 22 all

    - name: Install testsuite dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make git

    - name: Build llvm-opt
      run: cargo build -p llvm-opt --verbose

    - name: Run llvm-opt testsuite
      env:
        CLANG: clang-22
        LLVM_OPT: ${{ github.workspace }}/target/debug/llvm-opt
        LLVM_OPT_WRAPPER: ${{ github.workspace }}/pliron-llvm/llvm-opt/llvm-opt-wrapper.sh
      run: bash pliron-llvm/llvm-opt/tests/testsuite.sh

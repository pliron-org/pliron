name: Deploy Rust Docs to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Workspace Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup LLVM
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22 all

      - name: Install mdBook
        run: |
          cargo install mdbook --locked

      - name: Build documentation
        run: |
          RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

      - name: Build Kaleidoscope tutorial
        run: |
          mdbook build kaleidoscope
          rm -rf target/doc/Kaleidoscope
          mv target/kaleidoscope target/doc/Kaleidoscope

      - name: Create docs landing page
        run: |
          cp .github/workflows/docs-pages-index.html target/doc/index.html
          cp .github/workflows/pliron-192x192.png target/doc/pliron-192x192.png
          cp .github/workflows/pliron-logo.png target/doc/pliron-logo.png
          touch target/doc/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy-docs:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
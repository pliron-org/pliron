name: pliron

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Test (without default features)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Setup LLVM
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 22 all

    - name: Format
      run: cargo fmt --check

    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings --no-default-features

    - name: Build & Test LLVM - debug without default features
      run: RUSTFLAGS="-D warnings" cargo test -p pliron-llvm --no-default-features --verbose

    - name: Build & Test LLVM - release without default features
      run: RUSTFLAGS="-D warnings" cargo test -p pliron-llvm --no-default-features --release --verbose

    - name: Documentation
      run: RUSTDOCFLAGS="-D warnings" cargo doc -p pliron-llvm --no-default-features --verbose
